# Homebase on Railway: Node API + Vite SPA (Express serves dist/public).
# Not a Caddy-only static host — disable Vite SPA auto-detection (see Nixpacks Node provider).

[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
# Railway/Nixpacks set NODE_ENV=production; --include=dev ensures vite/tsc exist for build
cmds = ["HUSKY=0 npm ci --include=dev"]

[variables]
NIXPACKS_NODE_VERSION = "22"
NIXPACKS_SPA_CADDY = "false"
NPM_CONFIG_PRODUCTION = "false"
HUSKY = "0"
# Puppeteer is runtime-only on Railway; skip Chrome download during image build
PUPPETEER_SKIP_DOWNLOAD = "true"
