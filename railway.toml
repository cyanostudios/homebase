# Homebase API + SPA (repo root). Cupappen uses public-cups/ in a separate Railway project.
# https://docs.railway.com/config-as-code

[build]
builder = "nixpacks"
buildCommand = "HUSKY=0 NPM_CONFIG_PRODUCTION=false npm ci && npm run build"

[deploy]
startCommand = "npm start"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
