# Homebase API + SPA (repo root). Cupappen uses public-cups/ in a separate Railway project.
# https://docs.railway.com/config-as-code

[build]
builder = "nixpacks"
# Install phase already runs npm ci (see nixpacks.toml). Second npm ci causes EBUSY on node_modules/.cache.
buildCommand = "npm run build"

[deploy]
startCommand = "npm start"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
